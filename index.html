<!-- ================= JAVASCRIPT ================= -->
<script>

function switchScene(current, next) {
    document.getElementById(current).classList.remove("active");
    document.getElementById(next).classList.add("active");
}

// START GAME
function startGame() {
    const loading = document.getElementById("loading-screen");
    loading.classList.add("active");

    setTimeout(() => {
        switchScene("start-screen", "desk-scene");
        loading.classList.remove("active");
    }, 1500);
}

// EXIT
function exitGame() {
    const loading = document.getElementById("loading-screen");
    loading.classList.add("active");

    document.getElementById("loading-text").innerText = "EXITING...";

    setTimeout(() => {
        window.close();
    }, 1500);
}

// INTERACTION DIALOGUE 1
function openComputer() {
    showDialogue("The computer is still on...");

        // show choice AFTER dialogue finishes
    setTimeout(() => {
        document.getElementById("choice-box").style.display = "block";
    }, 1400); // match dialogue timing
}

function enterComputer() {
    const loading = document.getElementById("loading-screen");

    document.getElementById("choice-box").style.display = "none";

    loading.classList.add("active");

    setTimeout(() => {
        switchScene("desk-scene", "computer-scene"); 
        loading.classList.remove("active");
    }, 1500);
}

function closeChoice() {
    document.getElementById("choice-box").style.display = "none";
}

function inspectPoster() {
    showDialogue("A missing person poster...they've been missing for 9 months...");
}

let typingInterval;
let dialogueTimeout;

function showDialogue(text) {
    const box = document.getElementById("dialogue-box");
    const content = document.getElementById("dialogue-text");
    const sound = document.getElementById("type-sound");

    clearInterval(typingInterval);
    clearTimeout(dialogueTimeout);

    // HARD STOP any existing sound
    if (sound) {
        sound.pause();
        sound.currentTime = 0;
    }

    box.style.display = "block";
    content.innerText = "";

    let i = 0;

    typingInterval = setInterval(() => {

        content.innerText += text[i];

        // 🔥 ONLY play sound if it's NOT already playing
        if (sound && sound.paused && text[i] !== " ") {
            sound.play().catch(() => {});
        }

        i++;

        if (i >= text.length) {
            clearInterval(typingInterval);

            // STOP sound immediately when done
            if (sound) {
                sound.pause();
                sound.currentTime = 0;
            }

            dialogueTimeout = setTimeout(() => {
                box.style.display = "none";
            }, 2500);
        }

    }, 35);
}

// ================= COMPUTER UI SECTION =================

function openFile(type) {

    if (type === "logs") {
        showPopup(
            "ERROR: No data found",
            `<button onclick="closePopup()">OK</button>`
        );
    }

    if (type === "employees") {
        showPopup(
            "ERROR: Employee data missing",
            `<button onclick="closePopup()">OK</button>`
        );
    }

    if (type === "footage") {
        showPopup(
            "Corrupted file detected. Attempt recovery?",
            `
            <button onclick="recoverFootage()">YES</button>
            <button onclick="closePopup()">NO</button>
            `
        );
    }
}


// ================= RECOVERY SYSTEM =================

function recoverFootage() {
    const popupText = document.getElementById("popup-text");
    const popupButtons = document.getElementById("popup-buttons");
    const progressContainer = document.getElementById("progress-container");
    const progressBar = document.getElementById("progress-bar");

    popupButtons.innerHTML = ""; // remove buttons
    progressContainer.style.display = "block";

    let progress = 0;

    const messages = [
        "Recovering file...",
        "Reconstructing data...",
        "Restoring identity...",
        "ERROR... retrying...",
        "Recovery almost complete..."
    ];

    const interval = setInterval(() => {

        // update progress
        progress += Math.random() * 12;
        progressBar.style.width = progress + "%";

        // randomly change text 👁️
        popupText.innerText = messages[Math.floor(Math.random() * messages.length)];

        if (progress >= 100) {
            clearInterval(interval);

            progressBar.style.width = "100%";
            popupText.innerText = "File recovered.";

            popupButtons.innerHTML = `
                <button onclick="openRecoveredFile()">OPEN FILE</button>
            `;
        }

    }, 200);
}


// ================= OPEN RECOVERED FILE =================

function openRecoveredFile() {
    closePopup();

    const loading = document.getElementById("loading-screen");
    loading.classList.add("active");

    setTimeout(() => {
        switchScene("computer-scene", "footage-scene");
        loading.classList.remove("active");
    }, 1500);
}


// ================= POPUP SYSTEM =================

function showPopup(text, buttonsHTML) {
    const popup = document.getElementById("popup-box");
    const popupText = document.getElementById("popup-text");
    const popupButtons = document.getElementById("popup-buttons");
    const progressContainer = document.getElementById("progress-container");
    const progressBar = document.getElementById("progress-bar");

    popup.style.display = "block";
    popupText.innerText = text;
    popupButtons.innerHTML = buttonsHTML;

    // reset progress bar every time popup opens
    progressContainer.style.display = "none";
    progressBar.style.width = "0%";
}

function closePopup() {
    document.getElementById("popup-box").style.display = "none";
}



// ================= FOUND FOOTAGE DIALOGUE =================

// ================= GLOBAL CONTROL =================
let dialogueIndex = 0;
let typingInterval2;
let dialogueTimeout2;
let dialogueLoopTimeout;

let currentMode = "normal"; // "normal" or "corrupted"

function stopAllDialogue3() {
    clearInterval(typingInterval3);
    clearTimeout(dialogueTimeout3);
}

// ================= DIALOGUE DATA =================

const footageDialogue = [

];

// ================= START =================

function startFootageDialogue() {

    stopAllDialogue(); // 🔥 VERY IMPORTANT

    currentMode = "normal";
    dialogueIndex = 0;

    runDialogue();
}


// ================= MASTER DIALOGUE LOOP =================

function runDialogue() {

    let currentArray = (currentMode === "normal") 
        ? footageDialogue 
        : corruptedDialogue;

if (dialogueIndex >= currentArray.length) {

    // 👁️ ONLY trigger ending after corrupted dialogue finishes
    if (currentMode === "corrupted") {
        triggerEnding();
    }

    return;
}

    const currentLine = currentArray[dialogueIndex];

    showDialogue2(currentLine);

    // 🔥 TRIGGER TRANSITION
    if (currentMode === "normal" && currentLine.includes("WE ARE NOTHING")) {
        setTimeout(() => {
            switchToCorruptedFootage();
        }, 1200);
        return; // STOP NORMAL LOOP HERE
    }

    dialogueIndex++;

    dialogueLoopTimeout = setTimeout(runDialogue, 3200);
}


// ================= STOP EVERYTHING =================

function stopAllDialogue() {
    clearInterval(typingInterval2);
    clearTimeout(dialogueTimeout2);
    clearTimeout(dialogueLoopTimeout);
}


// ================= IMAGE SWITCH =================

function switchToCorruptedFootage() {

    stopAllDialogue(); // STOP NORMAL LOOP

    const bg = document.getElementById("footage-bg");

    if (!bg) {
        console.error("footage-bg not found ❌");
        return;
    }

    bg.style.backgroundImage = "url('assets/images/scene3.png')";
    bg.classList.add("corrupted");

    currentMode = "corrupted";
    dialogueIndex = 0;

    setTimeout(() => {
        runDialogue(); // start corrupted dialogue cleanly
    }, 500);
}


// ================= DIALOGUE DISPLAY =================

function showDialogue2(text) {
    const box = document.getElementById("dialogue-box2");
    const content = document.getElementById("dialogue-text2");
    const label = document.getElementById("dialogue-label");

    const camSound = document.getElementById("type-sound-camera");
    const manSound = document.getElementById("type-sound-man");

    clearInterval(typingInterval2);
    clearTimeout(dialogueTimeout2);

    let currentSound;

    box.classList.remove("dialogue-camera", "dialogue-man");

    if (text.includes("[CAMERA]")) {
        box.classList.add("dialogue-camera");
        label.innerText = "CAMERA MAN";
        currentSound = camSound;
        text = text.replace("[CAMERA] ", "");
    } 
    else if (text.includes("[MAN]")) {
        box.classList.add("dialogue-man");
        label.innerText = "STRANGER";
        currentSound = manSound;
        text = text.replace("[MAN] ", "");
    }

    box.style.display = "block";
    content.innerText = "";

    let i = 0;

    typingInterval2 = setInterval(() => {

        content.innerText += text[i];

        if (currentSound && currentSound.paused && text[i] !== " ") {
            currentSound.currentTime = 0;
            currentSound.play().catch(() => {});
        }

        i++;

        if (i >= text.length) {
            clearInterval(typingInterval2);

            if (currentSound) {
                currentSound.pause();
                currentSound.currentTime = 0;
            }

            dialogueTimeout2 = setTimeout(() => {
                box.style.display = "none";
            }, 2000);
        }

    }, 25);
}

// 🔥 FINAL TRIGGER AFTER LAST LINE
function triggerEnding() {
    const camera = document.querySelector(".camera");
    const flash = document.getElementById("glitch-flash");

    // HARD STOP animation
    camera.style.animation = "none";

    // force reflow (VERY IMPORTANT)
    camera.offsetHeight;

    // flash
    flash.classList.add("active");

    setTimeout(() => {
        camera.classList.add("fall");
    }, 100);

    setTimeout(() => {
document.getElementById("ending-popup").style.display = "block";
    }, 1000);
}



// EXIT FROM FOOTAGE
function exitFootage() {
    const loading = document.getElementById("loading-screen");
    loading.classList.add("active");

    setTimeout(() => {
        loading.classList.remove("active");
        startReturnScene(); // 🔥 cleaner + reusable
    }, 1500);
}

}

// ================= NOISE + SHAKE =================

function triggerNoiseEvent() {

    const scene = document.getElementById("return-scene");
    const footstep = document.getElementById("footstep-sound");

    // 🔥 use scene instead of empty div
    scene.classList.add("shake");

    // 🔊 footsteps
    if (footstep) {
        footstep.currentTime = 0;
        footstep.loop = true;
        footstep.play().catch(() => {});
    }

    setTimeout(() => {
        stopShake();
    }, 3000);
}

function stopShake() {

    const scene = document.getElementById("return-scene");
    const footstep = document.getElementById("footstep-sound");

    scene.classList.remove("shake");

    if (footstep) {
        footstep.pause();
        footstep.currentTime = 0;
    }

    document.getElementById("corridor-hotspot").style.display = "block";
}


// ================= FIGURE REVEAL =================

function triggerFigureReveal() {

    const figure = document.getElementById("shadow-figure");
    const hotspot = document.getElementById("corridor-hotspot");

    // stop ANY previous dialogue cleanly
    stopAllDialogue3();

    hotspot.style.display = "none";
    figure.style.opacity = "1";

    console.log("Figure revealed 👁️");

    setTimeout(() => {
        startEncounterDialogue();
    }, 1500);
}

// ================= TYPEWRITER =================

function showHRDialogue(text) {

    const box = document.getElementById("hr-dialogue-box");
    const content = document.getElementById("hr-dialogue-text");

    const playerSound = document.getElementById("type-sound-player");
    const entitySound = document.getElementById("type-sound-entity");

    clearInterval(hrTypingInterval);
    clearTimeout(hrTimeout);

    let currentSound;

    box.classList.remove("hr-player", "hr-entity");

    if (text.includes("[PLAYER]")) {
        box.classList.add("hr-player");
        currentSound = playerSound;
        text = text.replace("[PLAYER] ", "");
    } 
    else if (text.includes("[ENTITY]")) {
        box.classList.add("hr-entity");
        currentSound = entitySound;
        text = text.replace("[ENTITY] ", "");
    }

    box.style.display = "block";
    content.innerText = "";

    let i = 0;

    hrTypingInterval = setInterval(() => {

        content.innerText += text[i];

        if (currentSound && currentSound.paused && text[i] !== " ") {
            currentSound.currentTime = 0;
            currentSound.play().catch(() => {});
        }

        i++;

        if (i >= text.length) {

            clearInterval(hrTypingInterval);

            if (currentSound) {
                currentSound.pause();
                currentSound.currentTime = 0;
            }

            hrTimeout = setTimeout(() => {
                box.style.display = "none";
            }, 2000);

    }, 30);

// ================= FINAL CHOICES + TIMER =================

let choiceTimer;
let timeLeft = 8;

function showFinalChoices() {

    const container = document.getElementById("choice-container");

    container.innerHTML = `
        <button onclick="endingShutdown()">SHUT DOWN</button>
        <button onclick="endingLeave()">LEAVE</button>
        <div id="choice-timer">8</div>
    `;

    container.style.display = "flex";

    startChoiceTimer();
}

function startChoiceTimer() {

    const timerEl = document.getElementById("choice-timer");
    timeLeft = 8;

    choiceTimer = setInterval(() => {

        timeLeft--;
        timerEl.innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(choiceTimer);
            triggerOverwriteEnding();
        }

    }, 1000);
}

function clearChoiceTimer() {
    clearInterval(choiceTimer);
}


// ================= ENDING TYPEWRITER =================

let endingTypingInterval;

function showEndingText(text) {

    const el = document.getElementById("ending-text");
    const sound = document.getElementById("type-sound-ending");

    clearInterval(endingTypingInterval);

    el.innerText = "";
    el.style.display = "block";

    let i = 0;

    endingTypingInterval = setInterval(() => {

        el.innerText += text[i];

        // 🔊 play typing sound
        if (sound && sound.paused && text[i] !== " ") {
            sound.currentTime = 0;
            sound.play().catch(() => {});
        }

        i++;

        if (i >= text.length) {
            clearInterval(endingTypingInterval);

            if (sound) {
                sound.pause();
                sound.currentTime = 0;
            }

            // 👇 show buttons AFTER text finishes
            showEndingButtons();
        }

    }, 35);
}


// ================= ENDING BUTTONS =================

function showEndingButtons() {

    let container = document.getElementById("ending-buttons");

    // create container if it doesn't exist
    if (!container) {
        container = document.createElement("div");
        container.id = "ending-buttons";
        document.getElementById("ending-scene").appendChild(container);
    }

    container.innerHTML = `
        <button id="retry-button" onclick="retryGame()">RETRY</button>
        <button id="exit-button" onclick="exitGame()">EXIT</button>
    `;

    container.style.display = "flex";
}


// ================= ENDINGS =================

// 🔻 SHUT DOWN
function endingShutdown() {

    clearChoiceTimer();
    document.getElementById("choice-container").style.display = "none";

    switchScene("hidden-room-scene", "ending-scene");

    document.getElementById("ending-bg").style.backgroundImage =
        "url('assets/images/shutdown.png')";

    showEndingText(
        "SYSTEM SHUTDOWN\n\nProduction halted.\nHuman creativity restored.\n\nBut at what cost?"
    );
}


// 🔻 LEAVE
function endingLeave() {

    clearChoiceTimer();
    document.getElementById("choice-container").style.display = "none";

    switchScene("hidden-room-scene", "ending-scene");

    document.getElementById("ending-bg").style.backgroundImage =
        "url('assets/images/runaway.png')";

    showEndingText(
        "YOU WALKED AWAY\n\nProduction continues.\nMore minds consumed.\n\nNothing changes."
    );
}


// 🔻 OVERWRITTEN
function triggerOverwriteEnding() {

    document.getElementById("choice-container").style.display = "none";

    switchScene("hidden-room-scene", "ending-scene");

    document.getElementById("ending-bg").style.backgroundImage =
        "url('assets/images/overwrite.png')";

    showEndingText("YOU HAVE BEEN OVERWRITTEN");
}


// ================= RETRY =================

function retryGame() {

    document.getElementById("retry-button").style.display = "none";
    document.getElementById("ending-text").style.display = "none";

    const exitBtn = document.getElementById("exit-button");
    if (exitBtn) exitBtn.style.display = "none";

    switchScene("ending-scene", "return-scene");

    setTimeout(() => {
        startEncounterDialogue();
    }, 500);
}


// ================= EXIT GAME =================

function exitGame() {

    document.getElementById("retry-button").style.display = "none";
    document.getElementById("ending-text").style.display = "none";

    const exitBtn = document.getElementById("exit-button");
    if (exitBtn) exitBtn.style.display = "none";

    switchScene("ending-scene", "start-screen"); // 👈 your main menu ID
}
